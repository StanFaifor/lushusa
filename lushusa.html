<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lushusa-website</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/195069db8f.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav class="navigation-bar">
            <div class="header">
                <div class="logo">
                    <h1>LUSH</h1>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Search..">
                </div>
                <div class="welcome-bar">
                    <i class="fa-solid fa-user"></i>
                    <p class="Welcome">Welcome</p>
                    <p class="signInlink"><a href="#">Sign in</a></p>
                    <p>|</p>
                    <p class="registerLink"><a href="#">Register</a></p>
                    <div class="heartAndBagIcons">
                        <i class="fa-regular fa-heart"></i>
                        <i class="fa-regular fa-bag-shopping"></i>
                    </div>
                    <div class="navigationButtons">
                        <a href="#">Our Impact</a>
                        <a href="#">New</a>
                        <a href="#">Christmas</a>
                        <a href="#">Gifts</a>
                        <a href="#">Bath and Shower</a>
                        <a href="#">Hair</a>
                        <a href="#">Skincare</a>
                        <a href="#">Body</a>
                        <a href="#">Scent</a>
                        <a href="#">Discover</a>
                        <a href="#">Lush Kitchen Subscription Box</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="section1">
            <div class="bothPics">
                <div class="pic1">        
                    <img class="holidayGifts" src="https://www.lushusa.com/on/demandware.static/-/Library-Sites-LushSharedLibrary/default/dw5303b7d8/2022/homepage/nov/CHRISTMAS-2022-THE-ART-OF-CHRISTMAS-BATHING-GIFT-HERO.jpg" alt="holiday gifts">
                </div>
                <div class="pic1Text">
                    <h3>Holiday Gifts</h3>
                    <p>Sleigh with seasonal gift sets</p>
                    <p>SHOP GIFTS</p>
                </div>
                <div class="pic2">
                    <img class="stockingStuffers" src="https://www.lushusa.com/on/demandware.static/-/Library-Sites-LushSharedLibrary/default/dw2906e46a/2022/homepage/oct/christmas-2022-snowman-finger-puppet-bath-bomb-hero_03_Image_card_desktop_548x430.jpg" alt="woman with rainwob hair and a toy on her finger">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
